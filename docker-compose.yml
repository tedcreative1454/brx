services:
  postgres:
    image: postgres:16-alpine
    container_name: brx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brx
      POSTGRES_PASSWORD: brx_password
      POSTGRES_DB: brx
    ports:
      - "5432:5432"
    volumes:
      - brx-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: brx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  brx-postgres-data:

