services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      POSTGRES_USER: brx
      POSTGRES_DB: brx
    volumes:
      - brx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brx -d brx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - brx-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - brx-uploads:/app/uploads
      - ./schema.sql:/schema.sql:ro
    expose:
      - "3000"

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./manifest.webmanifest:/usr/share/nginx/html/manifest.webmanifest:ro
      - ./sw.js:/usr/share/nginx/html/sw.js:ro
      - ./assets:/usr/share/nginx/html/assets:ro
      - ./scripts:/usr/share/nginx/html/scripts:ro
      - ./styles:/usr/share/nginx/html/styles:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  brx-postgres-data:
  brx-redis-data:
  brx-uploads:
